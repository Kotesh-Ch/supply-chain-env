openenv: "1.0"

id: supply-chain-disruption-manager
name: "Supply Chain Disruption Manager"
version: "1.0.0"
description: >
  A real-world RL environment where an AI agent manages a multi-node supply
  chain, handling supplier disruptions, routing shipments, managing inventory,
  and minimising costs across warehouses and suppliers.

author: "Challagurugula Naga Kotesh"
license: MIT

tasks:
  - id: easy
    name: "Single-Node Supply Chain"
    description: "1 warehouse, 1 supplier, no disruptions"
    difficulty: easy
    max_steps: 30
    score_range: [0.0, 1.0]
    passing_score: 0.4

  - id: medium
    name: "Multi-Node Network"
    description: "3 warehouses, 2 suppliers, random disruptions"
    difficulty: medium
    max_steps: 50
    score_range: [0.0, 1.0]
    passing_score: 0.4

  - id: hard
    name: "Cascading Disruptions"
    description: "5 warehouses, 4 suppliers, cascading failures + demand spikes"
    difficulty: hard
    max_steps: 80
    score_range: [0.0, 1.0]
    passing_score: 0.4

interface:
  reset:
    method: POST
    path: /reset
  step:
    method: POST
    path: /step
  state:
    method: GET
    path: /state
  health:
    method: GET
    path: /health

deployment:
  platform: huggingface_spaces
  framework: docker
  python_version: "3.11"
  port: 7860